<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<link rel="stylesheet" href="css/home.css">
</head>
<body>

<main class="hero">

    <p class="eyebrow">
        Two players · One board
    </p>

    <h1>
    Welcome to
        <span>Tic Tac Toe</span>
    </h1>

    <p class="subtitle">
        The timeless classic, reimagined.
    </p>

    <button id="startBtn">
        Start Game
    </button>

    <!-- Modal -->
    <div id="gameModal" class="modal hidden">

        <div class="modal-content">

            <div id="playerSection">

                <h2>Select Players</h2>

                <button class="playerBtn" data-players="1">
                    1 Player
                </button>

                <button class="playerBtn" data-players="2">
                    2 Players
                </button>

            </div>

            <div id="difficultySection" class="hidden">

                <h2>Select Difficulty</h2>

                <button class="difficultyBtn" data-difficulty="easy">
                    Easy
                </button>

                <button class="difficultyBtn" data-difficulty="medium">
                    Medium
                </button>

                <button class="difficultyBtn" data-difficulty="impossible">
                    Impossible
                </button>

            </div>

        </div>

    </div>

    <div class="vs">
        <span class="x">X</span>
        <span class="text">vs</span>
        <span class="o">O</span>
    </div>

</main>

<script src="js/home.js"></script>

</body>
</html>
